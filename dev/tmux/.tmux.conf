##### ─────────────────────────────────────────────
##### PLUGIN MANAGER + CORE PLUGINS
##### ─────────────────────────────────────────────

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '15'

##### ─────────────────────────────────────────────
##### TERMINAL / COLOR BASE
##### ─────────────────────────────────────────────

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Amber base text, transparent background
set -g status-style fg=colour178,bg=default

##### ─────────────────────────────────────────────
##### STATUS BAR (RETRO AMBER SYSTEM)
##### ─────────────────────────────────────────────

set -g status-position top
set -g status-interval 5
set -g status-justify left

set -g status-left-length 60

# Red accent if zoomed + session name
set -g status-left "#{?window_zoomed_flag,#[fg=colour167]▌#[default] ,}#[fg=colour178,bold] #S #[default]"

set -g status-right-length 60

# Clean system stats (dim amber + separators)
set -g status-right "#[fg=colour180]CPU #(top -bn1 | awk '/Cpu/ {printf \"%.0f%%\", $2+$4}') #[fg=colour180]| RAM #(free -m | awk 'NR==2{printf \"%.0f%%\", $3*100/$2 }') #[fg=colour178]| %H:%M #[default]"

##### ─────────────────────────────────────────────
##### WINDOWS (BADGE STYLE LIKE NVIM)
##### ─────────────────────────────────────────────

# Inactive windows (dim amber)
set -g window-status-style fg=colour180,bg=default

# Active window (amber badge)
set -g window-status-current-style fg=colour16,bg=colour178,bold

set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=colour16,bg=colour178,bold]  #I:#W  #[default]"

##### ─────────────────────────────────────────────
##### PANES
##### ─────────────────────────────────────────────

# Subtle inactive borders
set -g pane-border-style fg=colour235

# Active pane (green = focus)
set -g pane-active-border-style fg=colour71

set -g display-panes-time 1500
set -g display-time 1500

##### ─────────────────────────────────────────────
##### GENERAL BEHAVIOR
##### ─────────────────────────────────────────────

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g prefix2 C-a

set -sg escape-time 0

setw -g automatic-rename on
set -g set-titles on

setw -g monitor-activity on
setw -g monitor-silence 0
setw -g monitor-bell off
set -g visual-activity off

##### ─────────────────────────────────────────────
##### KEYBINDINGS
##### ─────────────────────────────────────────────

unbind q
bind q detach

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind L clear-history

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits
bind V split-window -h
bind H split-window -v

# Sync panes
bind y set-window-option synchronize-panes \; display-message "sync panes"

# Window navigation
bind b previous-window

##### ─────────────────────────────────────────────
##### COPY MODE (VIM STYLE)
##### ─────────────────────────────────────────────

setw -g mode-keys vi

unbind p
bind p paste-buffer

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel \; display-message "copied"

##### ─────────────────────────────────────────────
##### POPUPS / UTILITIES
##### ─────────────────────────────────────────────

unbind f
bind-key f display-popup -E "$SHELL -lc ~/.local/bin/ts"

##### ─────────────────────────────────────────────
##### PLUGIN LOADER
##### ─────────────────────────────────────────────

run '~/.tmux/plugins/tpm/tpm'
