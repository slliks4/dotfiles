# -------------------------
# Window
# -------------------------
[window]
# opacity=1
# decorations = "None"

[window.padding]
x = 8
y = 6

# -------------------------
# Font
# -------------------------
[font]
size = 16

[font.normal]
family = "Terminus"
style = "Regular"

[font.bold]
family = "Terminus"
style = "Bold"

[font.italic]
family = "Terminus"
style = "Italic"

# -------------------------
# Cursor
# -------------------------
[cursor.style]
blinking = "on"

# -------------------------
# Colors (Retro Amber System)
# -------------------------

[colors.primary]
background = "#0b0a07"   # warm dark (NOT pure black)
foreground = "#e5a95c"   # soft amber

# Normal colors (used by tmux + nvim)
[colors.normal]
black   = "#0b0a07"
red     = "#e06c75"
green   = "#98c379"
yellow  = "#e5c07b"
blue    = "#d19a66"
magenta = "#c678dd"
cyan    = "#56b6c2"
white   = "#e5a95c"

# Bright colors (slightly lifted, not neon)
[colors.bright]
black   = "#5c4a2a"
red     = "#ff7a85"
green   = "#b5e48c"
yellow  = "#f0d58a"
blue    = "#e5b567"
magenta = "#d7a0ff"
cyan    = "#7fdede"
white   = "#ffffff"

# -------------------------
# Selection
# -------------------------
[colors.selection]
text = "#ffffff"
background = "#5f875f"

# -------------------------
# Cursor colors
# -------------------------
[colors.cursor]
text = "#0b0a07"
cursor = "#e5a95c"
