# ~/.config/foot/foot.ini

[main]
font=Terminus:size=13
dpi-aware=no
gamma-correct-blending=no
pad=2x6
resize-delay-ms=150
bold-text-in-bright=no

[colors]
# Soft amber / warm parchment (easy on eyes)

background=1a120c
foreground=f2e7cc

# Normal colors (muted, warm)
regular0=000000   # black
regular1=9e3c2f   # muted red
regular2=6f8a4a   # olive green
regular3=cc8a3a   # soft amber
regular4=8a6a44   # warm brown (blue substitute)
regular5=7a4f2f   # muted brown-magenta
regular6=9a8a5a   # brass / warm cyan
regular7=f2e7cc

# Bright colors (lifted but not neon)
bright0=3a2a1a
bright1=b84a3a
bright2=8fae5a
bright3=e6b35c
bright4=a88a5a
bright5=9a6a3c
bright6=bfb07a
regular7=f2e7cc
